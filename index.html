<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Wheels Scanner</title>
  <style>
    :root {
      --bg1: #071a3a;
      --bg2: #0d52c7;
      --card: rgba(255,255,255,0.10);
      --text: #ffffff;
      --muted: #d6e4ff;
      --accent: #ffd54a;
      --accent2: #ff6b00;
      --border: rgba(255,255,255,0.18);
      --shadow: 0 18px 50px rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
    }

    .container {
      width: min(1150px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      padding: 20px 0;
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(7, 26, 58, 0.45);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 10;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 24px;
    }

    .brand-badge {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      color: #0d1b2a;
      font-size: 22px;
      box-shadow: var(--shadow);
    }

    .lang-select {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
      min-width: 190px;
</html>
